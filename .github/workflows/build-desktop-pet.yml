name: Build Desktop Pet (Windows)

on:
  push:
    paths:
      - "desktop-pet/**"
      - ".github/workflows/build-desktop-pet.yml"
  pull_request:
    paths:
      - "desktop-pet/**"
      - ".github/workflows/build-desktop-pet.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-pet
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ensure videos exist
        shell: bash
        run: |
          if [ ! -f assets/videos/video.mp4 ]; then
            python scripts/make_placeholders.py
          fi

      - name: Build EXE
        run: python -m PyInstaller --noconfirm desktop_pet.spec

      - name: Make portable zip
        shell: bash
        run: |
          mkdir -p release
          cp dist/DesktopPet.exe release/
          cp 使用说明.txt release/
          cd release
          powershell -Command "Compress-Archive -Path 'DesktopPet.exe','使用说明.txt' -DestinationPath '../DesktopPet-便携版.zip' -Force"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-windows
          path: |
            desktop-pet/dist/DesktopPet.exe
            desktop-pet/DesktopPet-便携版.zip
          if-no-files-found: error