name: Build Desktop Pet (Windows)

on:
  push:
    paths:
      - "desktop-pet/**"
      - ".github/workflows/build-desktop-pet.yml"
  pull_request:
    paths:
      - "desktop-pet/**"
      - ".github/workflows/build-desktop-pet.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-pet
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ensure videos exist
        shell: bash
        run: |
          if [ ! -f assets/videos/video.mp4 ]; then
            python scripts/make_placeholders.py
          fi

      - name: Build EXE
        run: python -m PyInstaller --noconfirm desktop_pet.spec

      - name: Make portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/DesktopPet.exe release/
          # 使用 ASCII 文件名，避免 Windows Compress-Archive 中文乱码
          Copy-Item "使用说明.txt" release/readme.txt
          if (Test-Path DesktopPet-portable.zip) { Remove-Item DesktopPet-portable.zip -Force }
          Compress-Archive -Path release\* -DestinationPath DesktopPet-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-windows
          path: |
            desktop-pet/dist/DesktopPet.exe
            desktop-pet/DesktopPet-portable.zip
          if-no-files-found: error